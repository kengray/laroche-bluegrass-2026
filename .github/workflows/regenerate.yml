# =============================================================================
# .github/workflows/regenerate.yml
#
# Automatically regenerates LaRoche2026.ics and LaRoche2026_Festival_Schedule.xlsx
# whenever data/schedule.json is edited and pushed to the main branch.
#
# To trigger from Android:
#   1. Open the GitHub app
#   2. Navigate to data/schedule.json
#   3. Edit the file (e.g. add street festival acts, fix a time)
#   4. Commit — this workflow runs automatically within ~30 seconds
#   5. The updated .ics and .xlsx are committed back to the repo
#   6. Subscribers' calendars pick up the .ics change on next sync
# =============================================================================

name: Regenerate festival files

on:
  push:
    branches:
      - main
    paths:
      - 'data/schedule.json'   # Only runs when the schedule data changes
  workflow_dispatch:           # Also allows manual trigger from GitHub Actions tab

jobs:
  regenerate:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT_TOKEN }}   # Needs write access to push files back

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install openpyxl

      - name: Generate ICS and XLSX
        run: python scripts/generate_all.py

      - name: Commit and push updated files
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add LaRoche2026.ics LaRoche2026_Festival_Schedule.xlsx
          git diff --staged --quiet || git commit -m "Auto-regenerate festival files from schedule.json"
          git push
