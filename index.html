<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bluegrass in La Roche 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Source+Sans+3:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --green-dark: #1a3c34;
    --green-mid: #2d6a4f;
    --green-light: #d8f3dc;
    --gold: #b7950b;
    --gold-light: #f9f3d0;
    --cream: #faf8f3;
    --text: #1a1a18;
    --text-muted: #5a5a54;
    --border: #e0ddd5;
    --white: #ffffff;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Source Sans 3', sans-serif;
    background: var(--cream);
    color: var(--text);
    font-size: 16px;
    line-height: 1.6;
  }

  /* ── HERO ── */
  .hero {
    background: var(--green-dark);
    color: var(--white);
    padding: 4rem 2rem 3rem;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  .hero::before {
    content: '';
    position: absolute;
    inset: 0;
    background: repeating-linear-gradient(
      45deg,
      transparent,
      transparent 40px,
      rgba(255,255,255,0.015) 40px,
      rgba(255,255,255,0.015) 41px
    );
  }
  .hero-inner { position: relative; max-width: 680px; margin: 0 auto; }
  .hero-label {
    font-family: 'Source Sans 3', sans-serif;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.5);
    margin-bottom: 1rem;
  }
  .hero h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(2rem, 6vw, 3.2rem);
    font-weight: 600;
    line-height: 1.15;
    margin-bottom: 0.75rem;
  }
  .hero-sub {
    font-size: 16px;
    color: rgba(255,255,255,0.65);
    margin-bottom: 2rem;
  }
  .subscribe-btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: var(--gold);
    color: var(--white);
    padding: 12px 28px;
    border-radius: 4px;
    text-decoration: none;
    font-size: 14px;
    font-weight: 500;
    letter-spacing: 0.03em;
    transition: background 0.15s;
  }
  .subscribe-btn:hover { background: #9a7d09; }
  .subscribe-btn svg { width: 16px; height: 16px; }

  /* ── MAIN CONTENT ── */
  .content { max-width: 1100px; margin: 0 auto; padding: 2.5rem 1.5rem; }

  /* ── FILTERS ── */
  .filters {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-bottom: 2.5rem;
    padding-bottom: 1.5rem;
    border-bottom: 1px solid var(--border);
  }
  .filter-btn {
    font-family: 'Source Sans 3', sans-serif;
    font-size: 13px;
    font-weight: 400;
    padding: 6px 16px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: var(--white);
    color: var(--text-muted);
    cursor: pointer;
    transition: all 0.15s;
  }
  .filter-btn:hover { border-color: var(--green-mid); color: var(--green-mid); }
  .filter-btn.active {
    background: var(--green-dark);
    border-color: var(--green-dark);
    color: var(--white);
  }

  /* ── DAY SECTIONS ── */
  .day-section { margin-bottom: 3rem; }
  .day-header {
    display: flex;
    align-items: baseline;
    gap: 12px;
    margin-bottom: 1.25rem;
  }
  .day-title {
    font-family: 'Playfair Display', serif;
    font-size: 20px;
    font-weight: 600;
    color: var(--green-dark);
  }
  .day-count {
    font-size: 12px;
    color: var(--text-muted);
    font-weight: 300;
  }

  /* ── BAND GRID ── */
  .band-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 1px;
    background: var(--border);
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
  }
  .band-card {
    background: var(--white);
    padding: 1.25rem 1.5rem;
    transition: background 0.1s;
  }
  .band-card:hover { background: #fdfcf8; }

  .card-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 8px;
    margin-bottom: 6px;
  }
  .band-name {
    font-family: 'Playfair Display', serif;
    font-size: 16px;
    font-weight: 600;
    color: var(--text);
    line-height: 1.3;
  }
  .stage-pill {
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 3px 8px;
    border-radius: 3px;
    white-space: nowrap;
    flex-shrink: 0;
    margin-top: 2px;
  }
  .pill-main { background: var(--green-light); color: var(--green-mid); }
  .pill-day  { background: var(--gold-light);  color: var(--gold); }
  .pill-street { background: #e8f4fd; color: #2471a3; }

  .card-meta {
    font-size: 12px;
    color: var(--text-muted);
    margin-bottom: 10px;
    font-weight: 300;
  }
  .card-notes {
    font-size: 13px;
    color: var(--text-muted);
    line-height: 1.55;
    margin-bottom: 12px;
    display: -webkit-box;
    -webkit-line-clamp: 4;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .card-links { display: flex; gap: 6px; flex-wrap: wrap; }
  .card-link {
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    padding: 4px 10px;
    border: 1px solid var(--border);
    border-radius: 3px;
    color: var(--text-muted);
    text-decoration: none;
    background: transparent;
    transition: all 0.12s;
  }
  .card-link:hover { border-color: var(--green-mid); color: var(--green-dark); background: var(--green-light); }
  .card-link.spotify:hover { border-color: #1db954; color: #1db954; background: #edfbf2; }

  /* ── FOOTER ── */
  footer {
    text-align: center;
    padding: 2rem;
    font-size: 12px;
    color: var(--text-muted);
    border-top: 1px solid var(--border);
    margin-top: 2rem;
  }
  footer a { color: var(--green-mid); text-decoration: none; }
  footer a:hover { text-decoration: underline; }

  /* ── HIDDEN ── */
  .hidden { display: none !important; }

  @media (max-width: 600px) {
    .hero { padding: 3rem 1.25rem 2rem; }
    .content { padding: 1.5rem 1rem; }
    .band-grid { grid-template-columns: 1fr; }
  }
</style>
</head>

      if (filterBy === 'all') return b.date === day;
      if (filterBy === day)   return b.date === day;
      if (filterBy === 'Main Stage' || filterBy === 'Day Stage') return b.date === day && b.stage === filterBy;
      return false;
    });
    if (!dayBands.length) return;
    html += `<div class="day-section">
      <div class="day-header">
        <span class="day-title">${dayNames[day]}</span>
        <span class="day-count">${dayBands.length} act${dayBands.length !== 1 ? 's' : ''}</span>
      </div>
      <div class="band-grid">`;
    dayBands.forEach(b => {
      if (!b.name || b.name === 'Opening Ceremony') {
        if (b.name === 'Opening Ceremony') {
          html += `<div class="band-card">
            <div class="card-header"><span class="band-name">Opening Ceremony</span><span class="stage-pill pill-main">Main Stage</span></div>
            <div class="card-meta">${b.time}</div>
          </div>`;
        }
        return;
      }
      const links = [];
      if (b.website) links.push(`<a class="card-link" href="${b.website}" target="_blank">Website</a>`);
      if (b.video)   links.push(`<a class="card-link" href="${b.video}" target="_blank">Video</a>`);
      if (b.spotify) links.push(`<a class="card-link spotify" href="${b.spotify}" target="_blank">Spotify</a>`);
      html += `<div class="band-card">
        <div class="card-header">
          <span class="band-name">${b.name}</span>
          <span class="stage-pill ${pillClass(b.stage)}">${b.stage}</span>
        </div>
        <div class="card-meta">${b.time}${b.country ? ' &nbsp;·&nbsp; ' + b.country : ''}</div>
        ${b.notes ? `<p class="card-notes">${b.notes}</p>` : ''}
        ${links.length ? `<div class="card-links">${links.join('')}</div>` : ''}
      </div>`;
    });
    html += `</div></div>`;
  });
  container.innerHTML = html || '<p style="color:var(--text-muted);padding:1rem 0;">No acts found.</p>';
}

function filter(value, btn) {
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  render(value);
}

render('all');
</script>
</body>
</html>
